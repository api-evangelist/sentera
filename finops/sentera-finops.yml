description: >-
  FinOps view of Sentera FieldAgent spend. Sentera bills primarily through
  FieldAgent subscriptions (sensor-included, Pro, and Enterprise) plus hardware
  (sensors/drones); API access to the GraphQL endpoint is included with a
  subscription rather than metered per call. Cost drivers are subscription tier,
  cloud storage, imagery processing, and analytics/plot-analytics volume.
notes: >-
  Subscription and enterprise rates are quote- and package-dependent; verify
  against Sentera sales during reconciliation. No public per-API-call meter is
  published.
sources:
- https://sentera.com/fieldagent/
- https://api.sentera.com/api/getting_started/introduction.html
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sentera
serviceCategory: Precision Agriculture and Geospatial Analytics
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: FieldAgent
  ServiceCategory: Precision Agriculture and Geospatial Analytics
  ProviderName: Sentera
  PublisherName: Sentera
  InvoiceIssuerName: Sentera
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
meters:
- name: fieldagent_subscription
  description: Annual FieldAgent subscription seat/tier (sensor-included, Pro, Enterprise).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - tier
- name: cloud_storage
  description: Cloud storage consumed for imagery, mosaics, and processed layers.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - tier
- name: imagery_processing
  description: Imagery capture/processing jobs (surveys, flight tasks, mosaics).
  unit: jobs
  aggregation: sum
  dimensions:
  - account
  - survey
- name: analytics_runs
  description: Plot-analytics / field-insight computations (stand count, tassel count, etc.).
  unit: runs
  aggregation: sum
  dimensions:
  - account
  - analytic
- name: hardware
  description: One-time purchase of Sentera sensors and drones.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - product
principles:
- name: Visibility
  description: Track FieldAgent subscriptions, storage growth, and analytics volume per organization.
- name: Allocation
  description: Map FieldAgent organizations and fields to internal cost centers / programs.
- name: Optimization
  description: Right-size subscription tier and storage; batch imagery processing; prune unused surveys.
- name: Accountability
  description: Assign owners per organization/program and review annual subscription and analytics spend.
maintainers:
